<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人数カウンター & グループ分け</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c14;
      --surface: #10131f;
      --surface2: #161929;
      --border: rgba(255,255,255,0.07);
      --male: #3b82f6;
      --male-glow: rgba(59,130,246,0.35);
      --female: #ec4899;
      --female-glow: rgba(236,72,153,0.35);
      --accent: #8b5cf6;
      --accent-glow: rgba(139,92,246,0.3);
      --text: #f1f5f9;
      --text-muted: #64748b;
      --green: #22c55e;
      --radius: 20px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(59,130,246,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(139,92,246,0.08) 0%, transparent 60%);
    }

    header {
      text-align: center;
      padding: 48px 20px 24px;
    }
    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 900;
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.03em;
    }
    header p {
      color: var(--text-muted);
      margin-top: 8px;
      font-size: 0.95rem;
    }

    main { max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }

    /* ─── COUNTER SECTION ─── */
    .counter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .counter-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .counter-card:hover { transform: translateY(-2px); }

    .counter-card.male { box-shadow: 0 0 40px var(--male-glow); border-color: rgba(59,130,246,0.25); }
    .counter-card.female { box-shadow: 0 0 40px var(--female-glow); border-color: rgba(236,72,153,0.25); }

    .counter-card .label {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .male .label { color: var(--male); }
    .female .label { color: var(--female); }

    .counter-card .emoji { font-size: 2rem; margin-bottom: 8px; }

    .counter-card .count {
      font-size: clamp(3rem, 10vw, 5rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
    }
    .male .count { color: var(--male); }
    .female .count { color: var(--female); }

    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn:active { transform: scale(0.95); }

    .btn-add {
      padding: 14px 28px;
      font-size: 1.2rem;
      flex: 1;
      min-width: 80px;
      justify-content: center;
    }
    .male .btn-add { background: var(--male); color: #fff; box-shadow: 0 4px 20px var(--male-glow); }
    .male .btn-add:hover { background: #5b96ff; box-shadow: 0 6px 28px var(--male-glow); }
    .female .btn-add { background: var(--female); color: #fff; box-shadow: 0 4px 20px var(--female-glow); }
    .female .btn-add:hover { filter: brightness(1.1); }

    .btn-sub {
      padding: 14px 18px;
      font-size: 1.1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .btn-sub:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

    /* ─── TOTAL ─── */
    .total-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .total-label { color: var(--text-muted); font-size: 0.9rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase }
    .total-value { font-size: 2.2rem; font-weight: 900; color: var(--text); letter-spacing: -0.03em; }
    .progress-wrap { flex: 1; min-width: 120px; height: 8px; background: rgba(255,255,255,0.06); border-radius: 99px; overflow: hidden; }
    .progress-male { height: 100%; float: left; background: var(--male); transition: width 0.4s ease; }
    .progress-female { height: 100%; float: left; background: var(--female); transition: width 0.4s ease; }

    .btn-reset {
      padding: 10px 20px;
      font-size: 0.85rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-muted);
    }
    .btn-reset:hover { color: #ef4444; border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.08); }

    /* ─── DIVIDER ─── */
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 32px 0 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ─── GROUP CONFIG ─── */
    .group-config {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
      margin-bottom: 16px;
    }
    .config-field { display: flex; flex-direction: column; gap: 8px; }
    .config-field label { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; }
    .config-field input, .config-field select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
      width: 100px;
    }
    .config-field input:focus, .config-field select:focus { border-color: var(--accent); }

    .config-field.flex-grow { flex: 1; min-width: 180px; }
    .config-field.flex-grow input { width: 100%; }

    .btn-assign {
      padding: 12px 28px;
      font-size: 0.95rem;
      background: linear-gradient(135deg, var(--accent), #6d28d9);
      color: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .btn-assign:hover { filter: brightness(1.1); box-shadow: 0 6px 30px var(--accent-glow); }

    .btn-add-group {
      padding: 12px 20px;
      font-size: 0.9rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-muted);
    }
    .btn-add-group:hover { border-color: var(--green); color: var(--green); }

    /* ─── GROUP RESULTS ─── */
    .groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .group-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      animation: fadeIn 0.35s ease;
      position: relative;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .group-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .group-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
    }
    .group-badge {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 99px;
    }

    .group-member {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .group-member:last-child { border-bottom: none; }
    .member-icon { font-size: 1rem; }
    .member-num { color: var(--text-muted); font-size: 0.78rem; }

    .group-stats { display: flex; gap: 10px; margin-top: 14px; font-size: 0.78rem; }
    .stat-m { color: var(--male); font-weight: 700; }
    .stat-f { color: var(--female); font-weight: 700; }

    /* toast */
    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(60px);
      background: #1e293b; color: var(--text); padding: 12px 24px;
      border-radius: 12px; font-size: 0.9rem; font-weight: 600;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid var(--border);
      transition: transform 0.3s, opacity 0.3s; opacity: 0; z-index: 100;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    @media (max-width: 500px) {
      .counter-grid { grid-template-columns: 1fr; }
      .total-bar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<header>
  <h1>👥 人数カウンター</h1>
  <p>男女別カウント・グループ自動振り分け</p>
</header>

<main>

  <!-- ─── Counters ─── -->
  <div class="counter-grid">
    <div class="counter-card male">
      <div class="label">男性</div>
      <div class="emoji">🧑</div>
      <div class="count" id="male-count">0</div>
      <div class="btn-row">
        <button class="btn btn-sub" onclick="change('male',-1)">－</button>
        <button class="btn btn-add" onclick="change('male',1)">＋ カウント</button>
      </div>
    </div>
    <div class="counter-card female">
      <div class="label">女性</div>
      <div class="emoji">👱‍♀️</div>
      <div class="count" id="female-count">0</div>
      <div class="btn-row">
        <button class="btn btn-sub" onclick="change('female',-1)">－</button>
        <button class="btn btn-add" onclick="change('female',1)">＋ カウント</button>
      </div>
    </div>
  </div>

  <!-- ─── Total bar ─── -->
  <div class="total-bar">
    <div>
      <div class="total-label">合計</div>
      <div class="total-value" id="total-count">0 名</div>
    </div>
    <div class="progress-wrap" id="progress-bar">
      <div class="progress-male" id="prog-male" style="width:0%"></div>
      <div class="progress-female" id="prog-female" style="width:0%"></div>
    </div>
    <button class="btn btn-reset" onclick="resetAll()">🔄 リセット</button>
  </div>

  <!-- ─── Group config ─── -->
  <div class="section-title">グループ設定</div>

  <div class="group-config">
    <div class="config-field">
      <label>グループ数</label>
      <input type="number" id="group-count" value="3" min="1" max="50" onchange="handleGroupCountChange()" />
    </div>
    <button class="btn btn-add-group" onclick="addOneGroup()">＋ グループを追加</button>
  </div>

  <!-- ─── Group results ─── -->
  <div class="groups-grid" id="groups-grid"></div>

</main>

<div id="toast"></div>

<script>
  // ─── State ─────────────────────────────────────────────
  let counts = { male: 0, female: 0 };
  let groups = []; // [{name, members:[{gender}]}]

  const COLORS = [
    ['#3b82f6','rgba(59,130,246,0.15)'],
    ['#ec4899','rgba(236,72,153,0.15)'],
    ['#22c55e','rgba(34,197,94,0.15)'],
    ['#f59e0b','rgba(245,158,11,0.15)'],
    ['#8b5cf6','rgba(139,92,246,0.15)'],
    ['#06b6d4','rgba(6,182,212,0.15)'],
    ['#f97316','rgba(249,115,22,0.15)'],
    ['#a855f7','rgba(168,85,247,0.15)'],
    ['#10b981','rgba(16,185,129,0.15)'],
    ['#ef4444','rgba(239,68,68,0.15)'],
  ];

  // ─── Counter ───────────────────────────────────────────
  function change(gender, delta) {
    const prev = counts[gender];
    counts[gender] = Math.max(0, counts[gender] + delta);
    if (counts[gender] === prev) return;
    renderCounts();

    // bounce animation
    const el = document.getElementById(gender + '-count');
    void el.offsetWidth;
    el.style.transform = 'scale(1.18)';
    setTimeout(() => el.style.transform = '', 150);

    const n = parseInt(document.getElementById('group-count').value, 10);
    if (!n || n < 1) return;

    if (groups.length === 0) { assignGroups(true); return; }

    if (delta > 0) {
      // 均等モード：同性が最も少ないグループへ追加
      const minIdx = groups.reduce((mi, g, i) => {
        const val = g.members.filter(m => m.gender === gender).length;
        const minVal = groups[mi].members.filter(m => m.gender === gender).length;
        return val < minVal ? i : mi;
      }, 0);
      groups[minIdx].members.push({ gender });
    } else {
      // 同性を最も多く持つグループのうち、一番後ろ（新しい）グループから1人削除
      let targetIdx = -1, maxCount = -1;
      // 配列の後ろからループすることで、同数の場合は後ろのグループが優先される
      for (let i = groups.length - 1; i >= 0; i--) {
        const gCount = groups[i].members.filter(m => m.gender === gender).length;
        if (gCount > maxCount) { maxCount = gCount; targetIdx = i; }
      }
      if (targetIdx >= 0) {
        const idx = groups[targetIdx].members.map(m => m.gender).lastIndexOf(gender);
        if (idx >= 0) groups[targetIdx].members.splice(idx, 1);
      }
    }
    renderGroups();
  }

  function renderCounts() {
    document.getElementById('male-count').textContent = counts.male;
    document.getElementById('female-count').textContent = counts.female;
    const total = counts.male + counts.female;
    document.getElementById('total-count').textContent = total + ' 名';
    const mPct = total ? (counts.male / total * 100) : 0;
    const fPct = total ? (counts.female / total * 100) : 0;
    document.getElementById('prog-male').style.width = mPct + '%';
    document.getElementById('prog-female').style.width = fPct + '%';
  }

  function resetAll() {
    if (!confirm('カウントをリセットしますか？')) return;
    counts = { male: 0, female: 0 };
    groups = [];
    renderCounts();
    renderGroups();
    toast('リセットしました');
  }

  // ─── Group logic ────────────────────────────────────────

  function handleGroupCountChange() {
    const total = counts.male + counts.female;
    const n = parseInt(document.getElementById('group-count').value, 10);
    if (!n || n < 1) return;
    
    // グループ数が直接変更された場合は全体を再振り分け
    fullReassign(n);
  }

  function fullReassign(n) {
    let members = [
      ...Array.from({length: counts.male}, () => ({gender:'male'})),
      ...Array.from({length: counts.female}, () => ({gender:'female'}))
    ];

    groups = Array.from({length: n}, (_, i) => ({
      name: `グループ ${i + 1}`,
      members: [],
      colorIdx: i % COLORS.length,
    }));

    // 常に男女均等配分
    let ms = members.filter(m => m.gender === 'male');
    let fs = members.filter(m => m.gender === 'female');
    shuffle(ms); shuffle(fs);
    ms.forEach((m, i) => groups[i % n].members.push(m));
    fs.forEach((f, i) => groups[i % n].members.push(f));

    renderGroups();
  }

  function assignGroups(silent = false) {
    const n = parseInt(document.getElementById('group-count').value, 10);
    if (n >= 1) fullReassign(n);
  }

  function addOneGroup() {
    const newIdx = groups.length;
    groups.push({ name: `グループ ${newIdx + 1}`, members: [], colorIdx: newIdx % COLORS.length });
    // update input
    document.getElementById('group-count').value = groups.length;
    renderGroups();
    toast(`グループ ${newIdx + 1} を追加しました`);
  }

  // ─── Render ─────────────────────────────────────────────
  function renderGroups() {
    const grid = document.getElementById('groups-grid');
    if (groups.length === 0) { grid.innerHTML = ''; return; }

    grid.innerHTML = groups.map((g, gi) => {
      const [accent, bg] = COLORS[g.colorIdx];
      const mCount = g.members.filter(m => m.gender === 'male').length;
      const fCount = g.members.filter(m => m.gender === 'female').length;
      const membersHTML = g.members.length === 0
        ? '<div style="color:var(--text-muted);font-size:0.82rem;padding:8px 0;">メンバーなし</div>'
        : g.members.map((m, mi) => `
          <div class="group-member">
            <span class="member-icon">${m.gender === 'male' ? '🧑' : '👱‍♀️'}</span>
            <span>${m.gender === 'male' ? '男性' : '女性'}</span>
            <span class="member-num">#${mi + 1}</span>
          </div>`).join('');

      return `
        <div class="group-card" style="border-color:${accent}33; background: linear-gradient(145deg, var(--surface), ${bg});">
          <div class="group-card-header">
            <div class="group-name" contenteditable="true" style="outline:none;" spellcheck="false">${g.name}</div>
            <span class="group-badge" style="background:${bg};color:${accent};">${g.members.length}名</span>
          </div>
          ${membersHTML}
          ${g.members.length > 0 ? `
          <div class="group-stats">
            ${mCount > 0 ? `<span class="stat-m">🧑 ${mCount}</span>` : ''}
            ${fCount > 0 ? `<span class="stat-f">👱‍♀️ ${fCount}</span>` : ''}
          </div>` : ''}
        </div>`;
    }).join('');
  }

  // ─── Utils ──────────────────────────────────────────────
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  }

  function interleave(a, b) {
    const result = [];
    const max = Math.max(a.length, b.length);
    for (let i = 0; i < max; i++) {
      if (i < a.length) result.push(a[i]);
      if (i < b.length) result.push(b[i]);
    }
    return result;
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }
</script>

</body>
</html>
